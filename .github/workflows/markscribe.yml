name: markscribe

on:
  push:
    branches: ["main"]
    paths:
      - 'README.gtpl'
      - 'README.md'
      - '.github/workflows/markscribe.yml'
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  markscribe:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate README
        uses: muesli/readme-scribe@master
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        with:
          template: 'README.gtpl'
          writeTo: 'README.md'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Credly Badges for README
        run: node scripts/fetch-badges.js

      - name: Fetch Credly Badges for Website
        run: node website/scripts/fetch-badges.mjs

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        with:
          commit_message: 'ci: update README and badges from Credly'
          file_pattern: |
            README.md
            assets/badges/
            website/data/badges.json
