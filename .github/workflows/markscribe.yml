name: markscribe

on:
  push:
    branches: ["main"]
    paths:
      - 'README.gtpl'
      - 'README.md'
      - '.github/workflows/markscribe.yml'
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  markscribe:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate README
        uses: muesli/readme-scribe@master
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        with:
          template: 'README.gtpl'
          writeTo: 'README.md'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Credly Badges for README
        run: node scripts/fetch-badges.js

      - name: Fetch Credly Badges for Website
        run: node website/scripts/fetch-badges.mjs

      # - name: "Debug: list badges and git status"
      #   run: |
      #     echo "PWD: $(pwd)"
      #     echo "Listing assets/badges"
      #     ls -la assets/badges || true
      #     echo "git status:" 
      #     git status --porcelain -uall || true
      #     echo "git ls-files (assets/badges):"
      #     git ls-files assets/badges || true
      #   # shell: bash

      - name: Commit downloaded badges (fallback)
        run: |
          set -e
          git --version
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md website/data/badges.json assets/badges || true
          if git diff --staged --quiet; then
            echo "No staged changes to commit"
          else
            git commit -m "ci: update README and badges from Credly"
            git push "https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git" HEAD:main
            # Dispatch deploy workflow only when we actually pushed changes
            echo "Dispatching deploy workflow"
            curl -s -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: token ${{ secrets.GH_PAT }}" \
              https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy-website.yml/dispatches \
              -d '{"ref":"main"}' || true
          fi
        shell: bash

      - name: Commit changes (auto-commit-action fallback)
        uses: stefanzweifel/git-auto-commit-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        with:
          commit_message: 'ci: update README and badges from Credly'
          skip_checkout: true
          file_pattern: |
            README.md
            assets/badges/
            website/data/badges.json
