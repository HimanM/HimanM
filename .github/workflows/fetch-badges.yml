name: Fetch and Update Badges

on:
  schedule:
    # Run daily at 00:05 UTC (5 minutes after markscribe)
    - cron: '5 0 * * *'
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - 'README.gtpl'
      - 'scripts/fetch-badges.js'
      - 'website/scripts/fetch-badges.mjs'
      - '.github/workflows/fetch-badges.yml'

jobs:
  fetch-badges:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # First: Run markscribe to regenerate README from template (with placeholder)
      - name: Generate README from template
        uses: muesli/readme-scribe@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Then: Fetch badges for README (downloads images locally and replaces placeholder)
      - name: Fetch Credly Badges for README
        working-directory: ./
        run: node scripts/fetch-badges.js

      # Also: Fetch badges for website (creates JSON data)
      - name: Fetch Credly Badges for Website
        working-directory: ./website
        run: node scripts/fetch-badges.mjs

      # Commit changes if there are any
      - name: Commit badge updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'ci: update badges from Credly'
          commit_options: '--no-verify'
          file_pattern: |
            assets/badges/
            website/data/badges.json
            README.md
